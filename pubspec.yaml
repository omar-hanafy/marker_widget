name: marker_widget
description: >
  Render Flutter widgets into google_maps_flutter bitmaps, glyphs, markers,
  and ground overlays with caching and modern Flutter View APIs.
version: 2.0.0

homepage: https://github.com/omar-hanafy/marker_widget
repository: https://github.com/omar-hanafy/marker_widget
issue_tracker: https://github.com/omar-hanafy/marker_widget/issues
documentation: https://github.com/omar-hanafy/marker_widget#readme

topics:
  - google-maps
  - google-maps-flutter
  - map
  - marker
  - widget

platforms:
  android:
  ios:
  web:

environment:
  sdk: ^3.10.0
  flutter: ">=3.41.4"

dependencies:
  equatable: ^2.0.0
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.15.0
  google_maps_flutter_platform_interface: ^2.14.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
